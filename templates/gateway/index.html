<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Gateway</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #030712; color: #e5e7eb; }
    .container { max-width: 760px; margin: 0 auto; padding: 48px 16px 56px; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 18px; }
    h1 { margin: 0 0 8px; }
    p { margin: 0; }
    .muted { color: #94a3b8; margin-top: 8px; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    a.button {
      display: inline-block;
      text-decoration: none;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      padding: 10px 14px;
      font-weight: 700;
    }
    a.button.secondary { background: #374151; }
  </style>
</head>
<body>
  <div class="container">
    <section class="card">
      <h1>AI Gateway</h1>
      <p>Регистрация и вход в личный кабинет.</p>
      <p class="muted">После авторизации вы автоматически попадете в профиль или в админ-раздел.</p>
      <div class="actions">
        <a class="button" href="/gateway/register">Регистрация</a>
        <a class="button secondary" href="/gateway/login">Войти</a>
      </div>
    </section>
  </div>
</body>
</html>
