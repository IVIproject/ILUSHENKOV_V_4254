<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gateway Admin - Финансы</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #030712; color: #e5e7eb; }
    .container { max-width: 1000px; margin: 0 auto; padding: 24px 16px 56px; }
    .header { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
    .nav a { color: #cbd5e1; text-decoration: none; border: 1px solid #334155; border-radius: 8px; padding: 6px 10px; }
    .nav a.active { background: #2563eb; border-color: #2563eb; color: #fff; }
    .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    input, button { width: 100%; margin-top: 6px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #334155; background: #0b1220; color: #e2e8f0; padding: 10px 12px; box-sizing: border-box; }
    button { border: 0; background: #2563eb; font-weight: 700; cursor: pointer; }
    button.secondary { background: #374151; }
    pre { margin: 0; white-space: pre-wrap; background: #020617; border: 1px solid #334155; border-radius: 10px; padding: 10px; min-height: 46px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Финансовые операции</h1>
      <button id="logoutBtn" class="secondary">Выйти</button>
    </div>

    <div class="nav">
      <a href="/gateway/admin">Обзор</a>
      <a href="/gateway/admin/users/ui">Пользователи</a>
      <a href="/gateway/admin/models/ui">Модели</a>
      <a href="/gateway/admin/finance/ui" class="active">Финансы</a>
    </div>

    <section class="card">
      <h2>Запрос операций</h2>
      <div class="grid">
        <div>
          <label>Фильтр по user_id (опционально)</label>
          <input id="userIdInput" type="number" min="1" placeholder="например 5" />
        </div>
        <div>
          <label>Лимит</label>
          <input id="limitInput" type="number" min="1" max="500" value="100" />
        </div>
      </div>
      <button id="loadBtn">Показать операции</button>
      <pre id="out"></pre>
    </section>
  </div>

  <script>
    const API_KEY_STORAGE = "gateway_api_key";

    function getApiKey() {
      return localStorage.getItem(API_KEY_STORAGE) || "";
    }

    function setText(id, value) {
      document.getElementById(id).textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
    }

    async function parseResponse(response) {
      const raw = await response.text();
      let data;
      try { data = raw ? JSON.parse(raw) : {}; } catch { data = { raw }; }
      if (!response.ok) {
        const detail = data && data.detail ? data.detail : raw || "Request failed";
        throw new Error(`HTTP ${response.status}: ${detail}`);
      }
      return data;
    }

    async function apiFetch(url) {
      const apiKey = getApiKey();
      if (!apiKey) throw new Error("API key not found. Please login as admin.");
      const response = await fetch(url, { headers: { "X-Gateway-Key": apiKey } });
      return parseResponse(response);
    }

    async function loadAudit() {
      try {
        const limit = Number(document.getElementById("limitInput").value || "100");
        const userId = document.getElementById("userIdInput").value.trim();
        const query = new URLSearchParams({ limit: String(limit) });
        if (userId) query.set("user_id", userId);
        const data = await apiFetch(`/gateway/admin/audit/balance?${query.toString()}`);
        setText("out", data.items);
      } catch (error) {
        setText("out", String(error));
      }
    }

    function logout() {
      localStorage.removeItem(API_KEY_STORAGE);
      window.location.href = "/gateway/login";
    }

    document.getElementById("loadBtn").addEventListener("click", loadAudit);
    document.getElementById("logoutBtn").addEventListener("click", logout);

    if (!getApiKey()) {
      window.location.href = "/gateway/login";
    } else {
      loadAudit();
    }
  </script>
</body>
</html>
