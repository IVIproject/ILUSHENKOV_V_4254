<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ - Финансовые операции</title>
  <style>
    :root {
      --bg: #030712;
      --panel: #111827;
      --panel-border: #1f2937;
      --field-bg: #0b1220;
      --field-border: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --primary: #2563eb;
      --secondary: #374151;
      --output-bg: #020617;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px 56px; }
    .card { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 12px; padding: 14px; margin-bottom: 14px; }
    .header { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
    .muted { color: var(--muted); font-size: 13px; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
    .nav a {
      display: inline-block;
      border: 1px solid var(--field-border);
      border-radius: 8px;
      padding: 8px 10px;
      text-decoration: none;
      color: var(--text);
      background: var(--field-bg);
      font-size: 14px;
    }
    .nav a.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    label { display: block; margin-top: 8px; color: #cbd5e1; font-size: 14px; }
    input, button {
      width: 100%;
      margin-top: 6px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid var(--field-border);
      background: var(--field-bg);
      color: #e2e8f0;
      padding: 10px 12px;
      font-size: 14px;
    }
    button { border: 0; background: var(--primary); font-weight: 700; cursor: pointer; }
    button.secondary { background: var(--secondary); }
    pre {
      margin: 0;
      white-space: pre-wrap;
      background: var(--output-bg);
      border: 1px solid var(--field-border);
      border-radius: 10px;
      padding: 10px;
      min-height: 46px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Админ: финансовые операции</h1>
        <div class="muted">Просмотр всех финансовых изменений пользователей.</div>
      </div>
      <div style="min-width: 180px;">
        <button id="logoutBtn" class="secondary">Выйти</button>
      </div>
    </div>

    <div class="nav">
      <a href="/gateway/admin">Обзор</a>
      <a href="/gateway/admin/users/ui">Пользователи</a>
      <a href="/gateway/admin/finance/ui" class="active">Финансы</a>
    </div>

    <section class="card">
      <h2>Запрос операций</h2>
      <div class="grid">
        <div>
          <label for="userIdInput">Фильтр по ID пользователя (необязательно)</label>
          <input id="userIdInput" type="text" inputmode="numeric" placeholder="Например 5" />
        </div>
        <div>
          <label for="limitInput">Лимит записей</label>
          <input id="limitInput" type="text" inputmode="numeric" value="100" />
        </div>
      </div>
      <button id="loadBtn">Поиск</button>
      <pre id="out"></pre>
    </section>
  </div>

  <script>
    const API_KEY_STORAGE = "gateway_api_key";

    function getApiKey() {
      return localStorage.getItem(API_KEY_STORAGE) || "";
    }

    function setText(id, value) {
      document.getElementById(id).textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
    }

    function toInt(raw, fallback) {
      const normalized = String(raw || "").replace(/[^\d-]/g, "");
      const parsed = Number.parseInt(normalized, 10);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    async function parseResponse(response) {
      const raw = await response.text();
      let data;
      try { data = raw ? JSON.parse(raw) : {}; } catch { data = { raw }; }
      if (!response.ok) {
        const detail = data && data.detail ? data.detail : raw || "Ошибка запроса";
        throw new Error(`HTTP ${response.status}: ${detail}`);
      }
      return data;
    }

    async function apiFetch(url) {
      const apiKey = getApiKey();
      if (!apiKey) throw new Error("Не найден API-ключ. Сначала выполните вход.");
      const response = await fetch(url, { headers: { "X-Gateway-Key": apiKey } });
      return parseResponse(response);
    }

    async function loadAudit() {
      try {
        const limit = toInt(document.getElementById("limitInput").value, 100);
        const userIdRaw = document.getElementById("userIdInput").value.trim();
        const userId = toInt(userIdRaw, 0);
        const query = new URLSearchParams({ limit: String(Math.max(1, limit)) });
        if (userIdRaw && userId > 0) query.set("user_id", String(userId));
        const data = await apiFetch(`/gateway/admin/audit/balance?${query.toString()}`);
        setText("out", data.items);
      } catch (error) {
        setText("out", String(error));
      }
    }

    function logout() {
      localStorage.removeItem(API_KEY_STORAGE);
      localStorage.removeItem("gateway_user_role");
      window.location.href = "/gateway/login";
    }

    document.getElementById("loadBtn").addEventListener("click", loadAudit);
    document.getElementById("logoutBtn").addEventListener("click", logout);

    if (!getApiKey()) {
      window.location.href = "/gateway/login";
    } else {
      loadAudit();
    }
  </script>
</body>
</html>
