<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Gateway — Модель</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #030712; color: #e5e7eb; }
    .container { max-width: 980px; margin: 0 auto; padding: 24px 16px 56px; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0 18px; }
    .nav a, .nav button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #e2e8f0; text-decoration: none; border: 1px solid #334155; border-radius: 8px;
      padding: 8px 12px; background: #0b1220; cursor: pointer; font-size: 14px;
    }
    .nav a.active { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }
    #logoutBtn { width: auto; margin-top: 0; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 10px; padding: 14px; margin-bottom: 14px; }
    input, textarea, button {
      width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #e2e8f0;
      padding: 10px 12px; margin-top: 6px; margin-bottom: 10px;
    }
    button { border: 0; background: #2563eb; font-weight: 700; cursor: pointer; }
    textarea { min-height: 120px; resize: vertical; }
    pre { margin: 0; background: #020617; border: 1px solid #334155; border-radius: 8px; padding: 10px; white-space: pre-wrap; min-height: 44px; }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="pageTitle">Модель</h1>

    <nav class="nav">
      <a href="/gateway/profile">Профиль</a>
      <a href="/gateway/models/page" class="active">Модели</a>
      <a href="/gateway/history">История</a>
      <a id="adminLink" href="/gateway/admin" style="display:none;">Управление</a>
      <button id="logoutBtn" type="button">Выйти</button>
    </nav>

    <section class="card">
      <h2>Описание модели</h2>
      <pre id="modelInfo">Загрузка...</pre>
    </section>

    <section class="card">
      <h2>Сделать запрос</h2>
      <label for="promptInput">Промпт</label>
      <textarea id="promptInput" placeholder="Введите запрос"></textarea>
      <button id="generateBtn" type="button">Отправить</button>
      <pre id="generateOut"></pre>
    </section>
  </div>
  <script>
    const API_KEY_STORAGE = "gateway_api_key";
    const USER_ROLE_STORAGE = "gateway_user_role";

    function setText(id, value) {
      document.getElementById(id).textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
    }

    function getApiKey() { return localStorage.getItem(API_KEY_STORAGE) || ""; }
    function getRole() { return localStorage.getItem(USER_ROLE_STORAGE) || ""; }
    function updateNav() { document.getElementById("adminLink").style.display = getRole() === "admin" ? "inline-block" : "none"; }

    function getModelIdFromPath() {
      const prefix = "/gateway/model/";
      const path = window.location.pathname;
      if (!path.startsWith(prefix)) return "";
      return decodeURIComponent(path.slice(prefix.length));
    }

    async function parseResponse(response) {
      const raw = await response.text();
      let data;
      try { data = raw ? JSON.parse(raw) : {}; } catch { data = { raw }; }
      if (!response.ok) {
        const detail = data && data.detail ? data.detail : raw || "Request failed";
        throw new Error(`HTTP ${response.status}: ${detail}`);
      }
      return data;
    }

    async function apiFetch(url, options = {}) {
      const key = getApiKey();
      if (!key) throw new Error("API-ключ не найден. Выполните вход заново.");
      const headers = Object.assign({}, options.headers || {}, { "X-Gateway-Key": key });
      const response = await fetch(url, Object.assign({}, options, { headers }));
      return parseResponse(response);
    }

    let currentModel = "";

    async function loadModelInfo() {
      try {
        currentModel = getModelIdFromPath();
        if (!currentModel) throw new Error("Идентификатор модели не найден в адресе страницы");
        const item = await apiFetch(`/gateway/models/${encodeURIComponent(currentModel)}`);
        document.getElementById("pageTitle").textContent = item.display_name || item.model_id;
        setText("modelInfo", {
          model_id: item.model_id,
          display_name: item.display_name,
          provider: item.provider,
          target_model: item.target_model,
        });
      } catch (error) {
        setText("modelInfo", String(error));
      }
    }

    async function generate() {
      try {
        const payload = {
          model_id: currentModel,
          prompt: document.getElementById("promptInput").value,
          temperature: 0.3,
          max_tokens: 600,
        };
        const data = await apiFetch("/gateway/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        setText("generateOut", data);
      } catch (error) {
        setText("generateOut", String(error));
      }
    }

    function logout() {
      localStorage.removeItem(API_KEY_STORAGE);
      localStorage.removeItem(USER_ROLE_STORAGE);
      window.location.href = "/gateway/login";
    }

    document.getElementById("generateBtn").addEventListener("click", generate);
    document.getElementById("logoutBtn").addEventListener("click", logout);

    if (!getApiKey()) {
      window.location.href = "/gateway/login";
    } else {
      updateNav();
      loadModelInfo();
    }
  </script>
</body>
</html>
