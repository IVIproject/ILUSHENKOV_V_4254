<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль пользователя</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #030712; color: #e5e7eb; }
    .container { max-width: 980px; margin: 0 auto; padding: 24px 16px 56px; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
    .nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .nav a, .nav button { text-decoration: none; border: 1px solid #334155; background: #0b1220; color: #e2e8f0; border-radius: 8px; padding: 8px 10px; cursor: pointer; }
    pre { margin: 0; white-space: pre-wrap; background: #020617; border: 1px solid #334155; border-radius: 10px; padding: 10px; min-height: 46px; }
    .muted { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Профиль пользователя</h1>
    <p class="muted">Баланс и быстрые переходы к моделям, истории и операциям.</p>
    <div class="nav">
      <a href="/gateway/models/page">Доступные модели</a>
      <a href="/gateway/history">История запросов</a>
      <a href="/gateway/finance">Финансовые операции</a>
      <button id="logoutBtn">Выйти</button>
    </div>
    <section class="card">
      <button id="refreshBtn">Обновить профиль</button>
      <pre id="profileOut"></pre>
    </section>
  </div>
  <script>
    const KEY = "gateway_api_key";
    function setText(id, value) { document.getElementById(id).textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2); }
    function getKey() { return localStorage.getItem(KEY) || ""; }
    async function parseResponse(response) {
      const raw = await response.text();
      let data; try { data = raw ? JSON.parse(raw) : {}; } catch { data = { raw }; }
      if (!response.ok) throw new Error(`HTTP ${response.status}: ${data.detail || raw || "Request failed"}`);
      return data;
    }
    async function apiFetch(url, options = {}) {
      const key = getKey();
      if (!key) { window.location.href = "/gateway/login"; return {}; }
      const headers = Object.assign({}, options.headers || {}, { "X-Gateway-Key": key });
      return parseResponse(await fetch(url, Object.assign({}, options, { headers })));
    }
    async function loadProfile() {
      try { setText("profileOut", await apiFetch("/gateway/me")); }
      catch (error) { setText("profileOut", String(error)); }
    }
    document.getElementById("refreshBtn").addEventListener("click", loadProfile);
    document.getElementById("logoutBtn").addEventListener("click", () => { localStorage.removeItem(KEY); window.location.href = "/gateway/login"; });
    loadProfile();
  </script>
</body>
</html>
