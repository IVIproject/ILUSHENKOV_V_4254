<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Gateway — Управление</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #030712; color: #e5e7eb; }
    .container { max-width: 980px; margin: 0 auto; padding: 24px 16px 56px; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .nav a, .nav button {
      text-decoration: none; border: 1px solid #334155; background: #0b1220; color: #e2e8f0;
      border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 14px;
    }
    .nav a.active { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
    .muted { color: #94a3b8; }
    .actions { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    a.button {
      display: inline-block; width: 100%; margin: 0; border-radius: 8px; border: 0;
      background: #2563eb; color: #fff; text-decoration: none; text-align: center;
      font-weight: 700; padding: 10px 12px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Управление</h1>
    <p class="muted">Раздел администратора.</p>

    <nav class="nav">
      <a href="/gateway/register">Регистрация</a>
      <a href="/gateway/login">Авторизация</a>
      <a href="/gateway/profile">Профиль</a>
      <a href="/gateway/models/page">Модели</a>
      <a href="/gateway/history">История</a>
      <a href="/gateway/admin" class="active">Управление</a>
      <button id="logoutBtn" type="button">Выйти</button>
    </nav>

    <section class="card">
      <div class="actions">
        <a class="button" href="/gateway/admin/users/ui">Пользователи</a>
        <a class="button" href="/gateway/admin/models/ui">Модели</a>
      </div>
    </section>
  </div>
  <script>
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("gateway_api_key");
      localStorage.removeItem("gateway_user_role");
      window.location.href = "/gateway/login";
    });
  </script>
</body>
</html>
