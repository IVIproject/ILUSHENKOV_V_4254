<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Gateway — Управление</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #030712; color: #e5e7eb; }
    .container { max-width: 1160px; margin: 0 auto; padding: 24px 16px 56px; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .nav a, .nav button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: 1px solid #334155;
      background: #0b1220;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
      width: auto;
    }
    .nav a.active { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }
    #logoutBtn { width: auto; margin-top: 0; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
    .muted { color: #94a3b8; }
    .small { color: #94a3b8; font-size: 12px; }
    .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    label { display: block; margin-top: 8px; color: #cbd5e1; font-size: 14px; }
    input, button, select {
      width: 100%;
      margin-top: 6px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0b1220;
      color: #e2e8f0;
      padding: 10px 12px;
    }
    select {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      background-image: none;
      padding-right: 12px;
    }
    select::-ms-expand { display: none; }
    button { border: 0; background: #2563eb; font-weight: 700; cursor: pointer; }
    button.inline { width: auto; padding: 6px 10px; margin: 0; font-size: 12px; }
    button.secondary { background: #374151; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border: 1px solid #334155; padding: 8px; text-align: left; vertical-align: top; }
    th { background: #0b1220; color: #cbd5e1; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      background: #020617;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px;
      min-height: 46px;
    }
    .split {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    @media (min-width: 1100px) {
      .split {
        grid-template-columns: 1.2fr 1fr;
      }
    }
    .no-margin { margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Управление</h1>
    <p class="muted">Одна страница: пользователи и модели.</p>

    <nav class="nav">
      <a href="/gateway/profile">Профиль</a>
      <a href="/gateway/models/page">Модели</a>
      <a href="/gateway/history">История</a>
      <a href="/gateway/admin" class="active">Управление</a>
      <button id="logoutBtn" type="button">Выйти</button>
    </nav>

    <div class="split">
      <section class="card">
        <h2 class="no-margin">Пользователи</h2>
        <p class="small">Редактирование роли, активности, API-ключа и удаление.</p>

        <div class="grid">
          <div>
            <label for="searchInput">Поиск email</label>
            <input id="searchInput" placeholder="user@example.com" />
          </div>
          <div>
            <label for="limitInput">Лимит</label>
            <input id="limitInput" type="number" min="1" max="200" value="50" />
          </div>
        </div>
        <label><input id="includeInactiveInput" type="checkbox" style="width:auto; margin-right:8px;" />Показывать неактивных</label>
        <button id="loadUsersBtn" type="button">Поиск</button>
        <div id="usersTableWrap"></div>
      </section>

      <section class="card">
        <h2 class="no-margin">Модели</h2>
        <p class="small">Редактирование цены и активности моделей.</p>
        <button id="loadModelsBtn" type="button">Обновить список моделей</button>
        <div id="modelsTableWrap"></div>
      </section>
    </div>

    <section class="card">
      <h2 class="no-margin">Результат действий</h2>
      <pre id="out"></pre>
    </section>
  </div>

  <script>
    const API_KEY_STORAGE = "gateway_api_key";

    function getApiKey() {
      return localStorage.getItem(API_KEY_STORAGE) || "";
    }

    function setText(id, value) {
      document.getElementById(id).textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
    }

    async function parseResponse(response) {
      const raw = await response.text();
      let data;
      try { data = raw ? JSON.parse(raw) : {}; } catch { data = { raw }; }
      if (!response.ok) {
        const detail = data && data.detail ? data.detail : raw || "Request failed";
        throw new Error(`HTTP ${response.status}: ${detail}`);
      }
      return data;
    }

    async function apiFetch(url, options = {}) {
      const key = getApiKey();
      if (!key) throw new Error("Сначала выполните вход.");
      const headers = Object.assign({}, options.headers || {}, { "X-Gateway-Key": key });
      const response = await fetch(url, Object.assign({}, options, { headers }));
      return parseResponse(response);
    }

    function logout() {
      localStorage.removeItem(API_KEY_STORAGE);
      localStorage.removeItem("gateway_user_role");
      window.location.href = "/gateway/login";
    }

    function buildUserActions(user) {
      const wrap = document.createElement("div");
      wrap.style.display = "grid";
      wrap.style.gap = "6px";

      const role = document.createElement("select");
      [["user", "Пользователь"], ["admin", "Администратор"]].forEach(([value, label]) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = label;
        option.selected = user.role === value;
        role.appendChild(option);
      });

      const activeLabel = document.createElement("label");
      activeLabel.className = "small";
      activeLabel.innerHTML = `<input type="checkbox" ${user.is_active ? "checked" : ""} style="width:auto; margin-right:8px;" />Активен`;
      const activeInput = activeLabel.querySelector("input");

      const saveBtn = document.createElement("button");
      saveBtn.className = "inline";
      saveBtn.textContent = "Сохранить";
      saveBtn.onclick = async () => {
        try {
          const result = await apiFetch(`/gateway/admin/users/${user.user_id}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ role: role.value, is_active: activeInput.checked }),
          });
          setText("out", result);
          await loadUsers();
        } catch (error) {
          setText("out", String(error));
        }
      };

      const usageBtn = document.createElement("button");
      usageBtn.className = "inline secondary";
      usageBtn.textContent = "История запросов";
      usageBtn.onclick = async () => {
        try {
          const result = await apiFetch(`/gateway/admin/users/${user.user_id}/usage?limit=100`);
          setText("out", result.items);
        } catch (error) {
          setText("out", String(error));
        }
      };

      const keyBtn = document.createElement("button");
      keyBtn.className = "inline secondary";
      keyBtn.textContent = "Новый API-ключ";
      keyBtn.onclick = async () => {
        try {
          const result = await apiFetch(`/gateway/admin/users/${user.user_id}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ regenerate_api_key: true }),
          });
          setText("out", result);
          await loadUsers();
        } catch (error) {
          setText("out", String(error));
        }
      };

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "inline secondary";
      deleteBtn.textContent = "Удалить";
      deleteBtn.onclick = async () => {
        if (!confirm(`Удалить пользователя ${user.email}?`)) return;
        try {
          const result = await apiFetch(`/gateway/admin/users/${user.user_id}`, { method: "DELETE" });
          setText("out", result);
          await loadUsers();
        } catch (error) {
          setText("out", String(error));
        }
      };

      wrap.appendChild(role);
      wrap.appendChild(activeLabel);
      wrap.appendChild(saveBtn);
      wrap.appendChild(usageBtn);
      wrap.appendChild(keyBtn);
      wrap.appendChild(deleteBtn);
      return wrap;
    }

    async function loadUsers() {
      try {
        const limit = Number(document.getElementById("limitInput").value || "50");
        const search = document.getElementById("searchInput").value.trim();
        const includeInactive = document.getElementById("includeInactiveInput").checked;
        const params = new URLSearchParams({ limit: String(limit), offset: "0", include_inactive: String(includeInactive) });
        if (search) params.set("search", search);

        const data = await apiFetch(`/gateway/admin/users?${params.toString()}`);
        const wrap = document.getElementById("usersTableWrap");
        wrap.innerHTML = "";

        const table = document.createElement("table");
        table.innerHTML = "<thead><tr><th>ID / Email</th><th>Роль / Статус</th><th>Действия</th></tr></thead><tbody></tbody>";
        const tbody = table.querySelector("tbody");

        data.users.forEach((u) => {
          const row = document.createElement("tr");
          const c1 = document.createElement("td");
          c1.innerHTML = `<div><strong>#${u.user_id}</strong></div><div>${u.email}</div>`;
          const c2 = document.createElement("td");
          c2.innerHTML = `<div>${u.role}</div><div>${u.is_active ? "активен" : "неактивен"}</div>`;
          const c3 = document.createElement("td");
          c3.appendChild(buildUserActions(u));
          row.appendChild(c1);
          row.appendChild(c2);
          row.appendChild(c3);
          tbody.appendChild(row);
        });

        wrap.appendChild(table);
      } catch (error) {
        setText("out", String(error));
      }
    }

    async function loadModels() {
      try {
        const data = await apiFetch("/gateway/admin/models");
        const wrap = document.getElementById("modelsTableWrap");
        wrap.innerHTML = "";

        const table = document.createElement("table");
        table.innerHTML = "<thead><tr><th>Модель</th><th>Провайдер</th><th>Цена</th><th>Действия</th></tr></thead><tbody></tbody>";
        const tbody = table.querySelector("tbody");

        data.models.forEach((m) => {
          const row = document.createElement("tr");

          const c1 = document.createElement("td");
          c1.innerHTML = `<div><strong>${m.display_name}</strong></div><div class="muted">${m.model_id}</div><div class="muted">Целевая: ${m.target_model}</div>`;

          const c2 = document.createElement("td");
          c2.innerHTML = `${m.provider}<br><span class="muted">${m.is_active ? "активна" : "выключена"}</span>`;

          const c3 = document.createElement("td");
          c3.innerHTML = `<div><strong>${m.price_per_1k_tokens}</strong> / 1k</div><div class="muted">Наценка: ${m.markup_percent ?? 0}%</div>`;

          const c4 = document.createElement("td");
          const price = document.createElement("input");
          price.type = "text";
          price.value = String(m.price_per_1k_tokens ?? 0);
          price.placeholder = "Новая цена за 1k";

          const active = document.createElement("select");
          active.innerHTML = `<option value="true" ${m.is_active ? "selected" : ""}>Активна</option><option value="false" ${!m.is_active ? "selected" : ""}>Отключена</option>`;

          const saveBtn = document.createElement("button");
          saveBtn.className = "inline";
          saveBtn.textContent = "Сохранить";
          saveBtn.onclick = async () => {
            try {
              const out = await apiFetch(`/gateway/admin/models/${encodeURIComponent(m.model_id)}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  price_per_1k_tokens: Number(price.value || "0"),
                  is_active: active.value === "true",
                }),
              });
              setText("out", { сохранено: out.model_id, цена: out.price_per_1k_tokens, активна: out.is_active });
              await loadModels();
            } catch (error) {
              setText("out", String(error));
            }
          };

          c4.appendChild(price);
          c4.appendChild(active);
          c4.appendChild(saveBtn);

          row.appendChild(c1);
          row.appendChild(c2);
          row.appendChild(c3);
          row.appendChild(c4);
          tbody.appendChild(row);
        });

        wrap.appendChild(table);
      } catch (error) {
        setText("out", String(error));
      }
    }

    document.getElementById("logoutBtn").addEventListener("click", logout);
    document.getElementById("loadUsersBtn").addEventListener("click", loadUsers);
    document.getElementById("loadModelsBtn").addEventListener("click", loadModels);

    loadUsers();
    loadModels();
  </script>
</body>
</html>
