<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Gateway — Администратор</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #030712;
      color: #e5e7eb;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 56px;
    }
    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .muted {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 0;
    }
    .actions {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    a.button, button {
      display: inline-block;
      width: 100%;
      margin: 0;
      border-radius: 8px;
      border: 0;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      text-align: center;
      font-weight: 700;
      padding: 10px 12px;
      cursor: pointer;
    }
    a.button.secondary, button.secondary { background: #374151; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Панель администратора</h1>
    <p class="muted">Выберите раздел управления. Все страницы выполнены в едином стиле.</p>
    <section class="card">
      <div class="actions">
        <a class="button" href="/gateway/admin/users/ui">Пользователи</a>
        <a class="button" href="/gateway/admin/finance/ui">Финансовые операции</a>
        <a class="button secondary" href="/gateway/profile">Профиль пользователя</a>
        <button id="logoutBtn" class="secondary">Выйти</button>
      </div>
    </section>
  </div>
  <script>
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("gateway_api_key");
      localStorage.removeItem("gateway_user_role");
      window.location.href = "/gateway/login";
    });
  </script>
</body>
</html>
