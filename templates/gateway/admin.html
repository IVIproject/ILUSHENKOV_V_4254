<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gateway Admin</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #030712; color: #e5e7eb; }
    .container { max-width: 980px; margin: 0 auto; padding: 24px 16px 56px; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 16px; }
    a, button {
      display: block;
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 0;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      text-align: center;
      font-weight: 700;
      cursor: pointer;
    }
    .secondary { background: #374151; }
    .muted { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Админ-раздел</h1>
    <p class="muted">Выберите раздел. Каждый блок вынесен на отдельную страницу.</p>
    <div class="card">
      <a href="/gateway/admin/users/ui">Пользователи</a>
      <a href="/gateway/admin/models/ui">Настройка цен и модели</a>
      <a href="/gateway/admin/finance/ui">Финансовые операции</a>
      <a href="/gateway/profile" class="secondary">Перейти в профиль пользователя</a>
      <button id="logoutBtn" class="secondary">Выйти (очистить ключ)</button>
    </div>
  </div>
  <script>
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("gateway_api_key");
      localStorage.removeItem("gateway_user_role");
      window.location.href = "/gateway/login";
    });
  </script>
</body>
</html>
