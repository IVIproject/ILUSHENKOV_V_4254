<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Gateway — Управление моделями</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #030712; color: #e5e7eb; }
    .container { max-width: 1080px; margin: 0 auto; padding: 24px 16px 56px; }
    .nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .nav a, .nav button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none; border: 1px solid #334155; border-radius: 8px; padding: 8px 12px;
      background: #111827; color: #e2e8f0; cursor: pointer; font-size: 14px; width: auto;
    }
    .nav a.active { background:#1d4ed8; border-color:#1d4ed8; color:#fff; }
    #logoutBtn { width: auto; margin-top: 0; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
    .muted { color: #94a3b8; }
    pre { margin: 0; white-space: pre-wrap; background: #020617; border: 1px solid #334155; border-radius: 10px; padding: 10px; min-height: 46px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border: 1px solid #334155; padding: 8px; text-align: left; vertical-align: top; }
    th { background: #0b1220; color: #cbd5e1; }
    input[type="text"] { width: 100%; border-radius: 8px; border: 1px solid #334155; background: #0b1220; color: #e2e8f0; padding: 8px 10px; margin-bottom: 8px; }
    .small-btn { border: 1px solid #334155; border-radius: 8px; background: #374151; color: #fff; padding: 6px 10px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Управление моделями</h1>
    <p class="muted">Редактирование цены и активности моделей.</p>

    <nav class="nav">
      <a href="/gateway/profile">Профиль</a>
      <a href="/gateway/models/page">Модели</a>
      <a href="/gateway/history">История</a>
      <a href="/gateway/admin" class="active">Управление</a>
      <button id="logoutBtn" type="button">Выйти</button>
    </nav>

    <section class="card">
      <button id="loadModelsBtn" type="button">Обновить список моделей</button>
      <div id="modelsWrap"></div>
      <pre id="out"></pre>
    </section>
  </div>

  <script>
    const API_KEY_STORAGE = "gateway_api_key";

    function getApiKey() { return localStorage.getItem(API_KEY_STORAGE) || ""; }
    function setText(id, value) { document.getElementById(id).textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2); }
    function logout() {
      localStorage.removeItem(API_KEY_STORAGE);
      localStorage.removeItem("gateway_user_role");
      window.location.href = "/gateway/login";
    }
    async function parseResponse(response) {
      const raw = await response.text();
      let data;
      try { data = raw ? JSON.parse(raw) : {}; } catch { data = { raw }; }
      if (!response.ok) {
        const detail = data && data.detail ? data.detail : raw || "Request failed";
        throw new Error(`HTTP ${response.status}: ${detail}`);
      }
      return data;
    }
    async function apiFetch(url, options = {}) {
      const key = getApiKey();
      if (!key) throw new Error("Сначала выполните вход.");
      const headers = Object.assign({}, options.headers || {}, { "X-Gateway-Key": key });
      const response = await fetch(url, Object.assign({}, options, { headers }));
      return parseResponse(response);
    }

    async function loadModels() {
      try {
        const data = await apiFetch("/gateway/admin/models");
        const wrap = document.getElementById("modelsWrap");
        wrap.innerHTML = "";
        const table = document.createElement("table");
        table.innerHTML = "<thead><tr><th>Модель</th><th>Провайдер</th><th>Цена</th><th>Действия</th></tr></thead><tbody></tbody>";
        const tbody = table.querySelector("tbody");

        data.models.forEach((m) => {
          const row = document.createElement("tr");

          const c1 = document.createElement("td");
          c1.innerHTML = `<div><strong>${m.display_name}</strong></div><div class="muted">${m.model_id}</div><div class="muted">Целевая: ${m.target_model}</div>`;

          const c2 = document.createElement("td");
          c2.innerHTML = `${m.provider}<br><span class="muted">${m.is_active ? "активна" : "выключена"}</span>`;

          const c3 = document.createElement("td");
          c3.innerHTML = `<div><strong>${m.price_per_1k_tokens}</strong> / 1k</div><div class="muted">Наценка: ${m.markup_percent ?? 0}%</div>`;

          const c4 = document.createElement("td");
          const price = document.createElement("input");
          price.type = "text";
          price.value = String(m.price_per_1k_tokens ?? 0);
          price.placeholder = "Новая цена за 1k";

          const active = document.createElement("select");
          active.innerHTML = `<option value="true" ${m.is_active ? "selected" : ""}>Активна</option><option value="false" ${!m.is_active ? "selected" : ""}>Отключена</option>`;

          const saveBtn = document.createElement("button");
          saveBtn.className = "small-btn";
          saveBtn.textContent = "Сохранить";
          saveBtn.onclick = async () => {
            try {
              const payload = { price_per_1k_tokens: Number(price.value || "0"), is_active: active.value === "true" };
              const out = await apiFetch(`/gateway/admin/models/${encodeURIComponent(m.model_id)}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
              });
              setText("out", { сохранено: out.model_id, цена: out.price_per_1k_tokens, активна: out.is_active });
              await loadModels();
            } catch (error) {
              setText("out", String(error));
            }
          };

          c4.appendChild(price);
          c4.appendChild(active);
          c4.appendChild(saveBtn);

          row.appendChild(c1);
          row.appendChild(c2);
          row.appendChild(c3);
          row.appendChild(c4);
          tbody.appendChild(row);
        });

        wrap.appendChild(table);
      } catch (error) {
        setText("out", String(error));
      }
    }

    document.getElementById("logoutBtn").addEventListener("click", logout);
    document.getElementById("loadModelsBtn").addEventListener("click", loadModels);
    loadModels();
  </script>
</body>
</html>
