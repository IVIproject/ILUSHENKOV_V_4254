<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Gateway — Регистрация</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #030712; color: #e5e7eb; }
    .container { max-width: 980px; margin: 0 auto; padding: 24px 16px 56px; }
    .header { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .nav a, .nav button {
      text-decoration: none; border: 1px solid #334155; background: #0b1220; color: #e2e8f0;
      border-radius: 8px; padding: 8px 12px; font-size: 14px; cursor: pointer;
    }
    .nav a.active { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
    .muted { color: #94a3b8; margin: 0; }
    label { display: block; margin-top: 8px; color: #cbd5e1; font-size: 14px; }
    input, button {
      width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #334155;
      background: #0b1220; color: #e2e8f0; padding: 10px 12px; margin-top: 6px; margin-bottom: 10px;
    }
    button { border: 0; background: #2563eb; font-weight: 700; cursor: pointer; }
    pre {
      margin: 0; white-space: pre-wrap; background: #020617; border: 1px solid #334155;
      border-radius: 10px; padding: 10px; min-height: 48px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Регистрация</h1>
        <p class="muted">Создайте аккаунт и войдите в сервис.</p>
      </div>
    </div>

    <nav class="nav" id="mainNav">
      <a href="/gateway/register" class="active">Регистрация</a>
      <a href="/gateway/login">Авторизация</a>
      <a href="/gateway/profile">Профиль</a>
      <a href="/gateway/models/page">Модели</a>
      <a href="/gateway/history">История</a>
      <a id="adminLink" href="/gateway/admin" style="display:none;">Управление</a>
      <button id="logoutBtn" type="button">Выйти</button>
    </nav>

    <section class="card">
      <label for="emailInput">Электронная почта</label>
      <input id="emailInput" placeholder="user@example.com" />
      <label for="passwordInput">Пароль</label>
      <input id="passwordInput" type="password" placeholder="Минимум 8 символов" />
      <button id="registerBtn" type="button">Создать аккаунт</button>
      <pre id="out"></pre>
    </section>
  </div>

  <script>
    const API_KEY_STORAGE = "gateway_api_key";
    const USER_ROLE_STORAGE = "gateway_user_role";

    function setOut(value) {
      document.getElementById("out").textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
    }

    function getRole() {
      return localStorage.getItem(USER_ROLE_STORAGE) || "";
    }

    function updateNav() {
      const isAdmin = getRole() === "admin";
      document.getElementById("adminLink").style.display = isAdmin ? "inline-block" : "none";
    }

    function logout() {
      localStorage.removeItem(API_KEY_STORAGE);
      localStorage.removeItem(USER_ROLE_STORAGE);
      window.location.href = "/gateway/login";
    }

    async function parseResponse(response) {
      const raw = await response.text();
      let data;
      try {
        data = raw ? JSON.parse(raw) : {};
      } catch {
        data = { raw };
      }
      if (!response.ok) {
        const detail = data && data.detail ? data.detail : raw || "Request failed";
        throw new Error(`HTTP ${response.status}: ${detail}`);
      }
      return data;
    }

    async function register() {
      try {
        const payload = {
          email: document.getElementById("emailInput").value.trim(),
          password: document.getElementById("passwordInput").value,
        };
        if (!payload.email || !payload.password) {
          throw new Error("Заполните почту и пароль.");
        }
        const response = await fetch("/gateway/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await parseResponse(response);
        localStorage.setItem(API_KEY_STORAGE, data.api_key);
        localStorage.setItem(USER_ROLE_STORAGE, data.role || "user");
        updateNav();
        setOut({ регистрация: "успешно", роль: data.role });
        window.location.href = data.role === "admin" ? "/gateway/admin" : "/gateway/profile";
      } catch (error) {
        setOut(String(error));
      }
    }

    document.getElementById("registerBtn").addEventListener("click", register);
    document.getElementById("logoutBtn").addEventListener("click", logout);
    updateNav();
  </script>
</body>
</html>
