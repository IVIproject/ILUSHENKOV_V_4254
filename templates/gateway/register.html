<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Gateway — Регистрация</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #030712;
      color: #e5e7eb;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 56px;
    }
    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .nav a {
      text-decoration: none;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0b1220;
      color: #e2e8f0;
      padding: 8px 12px;
      font-size: 14px;
    }
    label {
      display: block;
      margin-top: 8px;
      color: #cbd5e1;
      font-size: 14px;
    }
    input, button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0b1220;
      color: #e2e8f0;
      padding: 10px 12px;
      margin-top: 6px;
      margin-bottom: 10px;
    }
    button {
      border: 0;
      background: #2563eb;
      font-weight: 700;
      cursor: pointer;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      background: #020617;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px;
      min-height: 46px;
    }
    .muted {
      color: #94a3b8;
      margin-top: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Регистрация</h1>
    <p class="muted">Создайте аккаунт и получите доступ к личному кабинету.</p>
    <div class="nav">
      <a href="/gateway">Главная</a>
      <a href="/gateway/login">Уже есть аккаунт? Войти</a>
    </div>
    <section class="card">
      <label for="emailInput">Электронная почта</label>
      <input id="emailInput" placeholder="user@example.com" />
      <label for="passwordInput">Пароль</label>
      <input id="passwordInput" type="password" placeholder="Минимум 8 символов" />
      <button id="registerBtn">Создать аккаунт</button>
      <pre id="out"></pre>
    </section>
  </div>
  <script>
    const API_KEY_STORAGE = "gateway_api_key";
    const USER_ROLE_STORAGE = "gateway_user_role";

    function setOut(value) {
      document.getElementById("out").textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
    }

    async function parseResponse(response) {
      const raw = await response.text();
      let data;
      try {
        data = raw ? JSON.parse(raw) : {};
      } catch {
        data = { raw };
      }
      if (!response.ok) {
        const detail = data && data.detail ? data.detail : raw || "Request failed";
        throw new Error(`HTTP ${response.status}: ${detail}`);
      }
      return data;
    }

    async function register() {
      try {
        const payload = {
          email: document.getElementById("emailInput").value.trim(),
          password: document.getElementById("passwordInput").value,
        };
        if (!payload.email || !payload.password) {
          throw new Error("Заполните почту и пароль.");
        }
        const response = await fetch("/gateway/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await parseResponse(response);
        localStorage.setItem(API_KEY_STORAGE, data.api_key);
        localStorage.setItem(USER_ROLE_STORAGE, data.role || "user");
        setOut({ регистрация: "успешно", роль: data.role });
        window.location.href = data.role === "admin" ? "/gateway/admin" : "/gateway/profile";
      } catch (error) {
        setOut(String(error));
      }
    }

    document.getElementById("registerBtn").addEventListener("click", register);
  </script>
</body>
</html>
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gateway - Регистрация</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0b1220; color: #e2e8f0; }
    .container { max-width: 760px; margin: 0 auto; padding: 24px 16px 50px; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 12px; padding: 16px; }
    input, button { width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; padding: 10px 12px; margin-top: 6px; margin-bottom: 10px; }
    button { border: 0; background: #2563eb; font-weight: 700; cursor: pointer; }
    pre { margin: 0; background: #020617; border: 1px solid #334155; border-radius: 8px; padding: 10px; white-space: pre-wrap; min-height: 46px; }
    .links { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    a { color: #93c5fd; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Регистрация</h1>
    <div class="card">
      <label>Email</label>
      <input id="email" placeholder="user@example.com" />
      <label>Пароль</label>
      <input id="password" type="password" placeholder="минимум 8 символов" />
      <button id="submitBtn">Создать аккаунт</button>
      <pre id="out"></pre>
      <div class="links">
        <a href="/gateway/login">Уже есть аккаунт? Войти</a>
      </div>
    </div>
  </div>
  <script>
    const API_KEY_STORAGE = "gateway_api_key";
    const USER_ROLE_STORAGE = "gateway_user_role";

    function setOut(value) {
      document.getElementById("out").textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
    }

    async function parseResponse(response) {
      const raw = await response.text();
      let data;
      try {
        data = raw ? JSON.parse(raw) : {};
      } catch {
        data = { raw };
      }
      if (!response.ok) {
        const detail = data && data.detail ? data.detail : raw || "Request failed";
        throw new Error(`HTTP ${response.status}: ${detail}`);
      }
      return data;
    }

    async function register() {
      try {
        const payload = {
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value,
        };
        if (!payload.email || !payload.password) {
          throw new Error("Введите email и пароль");
        }
        const response = await fetch("/gateway/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await parseResponse(response);
        localStorage.setItem(API_KEY_STORAGE, data.api_key);
        localStorage.setItem(USER_ROLE_STORAGE, data.role || "user");
        setOut({ register: "ok", role: data.role, redirect: true });
        window.location.href = data.role === "admin" ? "/gateway/admin" : "/gateway/profile";
      } catch (error) {
        setOut(String(error));
      }
    }

    document.getElementById("submitBtn").addEventListener("click", register);
  </script>
</body>
</html>
