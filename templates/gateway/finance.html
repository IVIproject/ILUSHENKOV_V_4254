<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Gateway - Финансовые операции</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #030712; color: #e5e7eb; }
    .container { max-width: 980px; margin: 0 auto; padding: 24px 16px 56px; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
    .nav a { color: #93c5fd; text-decoration: none; margin-right: 10px; font-size: 14px; }
    input, button { width: 100%; margin-top: 6px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #334155; background: #0b1220; color: #e2e8f0; padding: 10px 12px; box-sizing: border-box; }
    button { background: #2563eb; border: 0; cursor: pointer; font-weight: 700; }
    pre { margin: 0; white-space: pre-wrap; background: #020617; border: 1px solid #334155; border-radius: 10px; padding: 10px; min-height: 50px; }
    .small { color: #94a3b8; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Финансовые операции</h1>
    <div class="nav">
      <a href="/gateway/profile">Профиль</a>
      <a href="/gateway/models">Модели</a>
      <a href="/gateway/history">История запросов</a>
      <a href="/gateway/login">Выход</a>
    </div>

    <section class="card">
      <h2>Операции по балансу</h2>
      <label>Лимит</label>
      <input id="limitInput" type="number" min="1" max="200" value="50" />
      <button id="loadBtn">Показать операции</button>
      <pre id="out"></pre>
    </section>

    <section class="card">
      <h2>Пополнение</h2>
      <p class="small">Пополнение в токенах как единой внутренней валюте.</p>
      <label>Токены</label>
      <input id="topupTokens" type="number" min="1" value="5000" />
      <button id="topupBtn">Пополнить</button>
      <pre id="topupOut"></pre>
    </section>
  </div>

  <script>
    const API_KEY_STORAGE = "gateway_api_key";

    function getApiKey() {
      return localStorage.getItem(API_KEY_STORAGE) || "";
    }

    function setText(id, value) {
      document.getElementById(id).textContent =
        typeof value === "string" ? value : JSON.stringify(value, null, 2);
    }

    async function parseResponse(response) {
      const raw = await response.text();
      let data;
      try {
        data = raw ? JSON.parse(raw) : {};
      } catch {
        data = { raw };
      }
      if (!response.ok) {
        const detail = data && data.detail ? data.detail : raw || "Request failed";
        throw new Error(`HTTP ${response.status}: ${detail}`);
      }
      return data;
    }

    async function apiFetch(url, options = {}) {
      const apiKey = getApiKey();
      if (!apiKey) {
        throw new Error("API key not found. Please login.");
      }
      const headers = Object.assign({}, options.headers || {}, { "X-Gateway-Key": apiKey });
      const response = await fetch(url, Object.assign({}, options, { headers }));
      return parseResponse(response);
    }

    async function loadAudit() {
      try {
        const limit = Number(document.getElementById("limitInput").value || "50");
        const data = await apiFetch(`/gateway/audit/balance?limit=${encodeURIComponent(limit)}`);
        setText("out", data.items || []);
      } catch (error) {
        setText("out", String(error));
      }
    }

    async function topup() {
      try {
        const tokens = Number(document.getElementById("topupTokens").value || "0");
        const data = await apiFetch("/gateway/tokens/topup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ tokens }),
        });
        setText("topupOut", data);
        await loadAudit();
      } catch (error) {
        setText("topupOut", String(error));
      }
    }

    function bind() {
      document.getElementById("loadBtn").addEventListener("click", loadAudit);
      document.getElementById("topupBtn").addEventListener("click", topup);
    }

    async function boot() {
      if (!getApiKey()) {
        window.location.href = "/gateway/login";
        return;
      }
      bind();
      await loadAudit();
    }

    boot();
  </script>
</body>
</html>
