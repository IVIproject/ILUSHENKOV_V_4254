<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Gateway — Доступные модели</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: Arial, sans-serif; background: #030712; color: #e5e7eb; }
    .container { max-width: 1120px; margin: 0 auto; padding: 24px 16px 56px; }
    .header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .nav a, .nav button {
      text-decoration: none; border: 1px solid #334155; background: #0b1220; color: #e2e8f0;
      border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 14px;
    }
    .nav a.active { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
    .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .model-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .chip {
      display: inline-block; font-size: 12px; background: #0f172a; border: 1px solid #334155;
      border-radius: 999px; padding: 4px 10px; color: #cbd5e1; margin-bottom: 10px;
    }
    .muted { color: #94a3b8; font-size: 13px; }
    button {
      border: 0; border-radius: 8px; padding: 10px 12px; background: #2563eb;
      color: #fff; font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Доступные модели</h1>
        <div class="muted">Выберите модель для перехода на страницу запроса.</div>
      </div>
      <button id="reloadBtn" type="button">Обновить список</button>
    </div>

    <nav class="nav">
      <a href="/gateway/register">Регистрация</a>
      <a href="/gateway/login">Авторизация</a>
      <a href="/gateway/profile">Профиль</a>
      <a href="/gateway/models/page" class="active">Модели</a>
      <a href="/gateway/history">История</a>
      <a id="adminLink" href="/gateway/admin" style="display:none;">Управление</a>
      <button id="logoutBtn" type="button">Выйти</button>
    </nav>

    <div id="modelsWrap" class="grid"></div>
  </div>

  <script>
    const API_KEY_STORAGE = "gateway_api_key";
    const USER_ROLE_STORAGE = "gateway_user_role";

    function getApiKey() { return localStorage.getItem(API_KEY_STORAGE) || ""; }
    function getRole() { return localStorage.getItem(USER_ROLE_STORAGE) || ""; }
    function updateNav() { document.getElementById("adminLink").style.display = getRole() === "admin" ? "inline-block" : "none"; }

    async function parseResponse(response) {
      const raw = await response.text();
      let data;
      try { data = raw ? JSON.parse(raw) : {}; } catch { data = { raw }; }
      if (!response.ok) {
        const detail = data && data.detail ? data.detail : raw || "Ошибка запроса";
        throw new Error(`HTTP ${response.status}: ${detail}`);
      }
      return data;
    }

    async function apiFetch(url, options = {}) {
      const apiKey = getApiKey();
      if (!apiKey) throw new Error("Ключ API не найден. Выполните вход заново.");
      const headers = Object.assign({}, options.headers || {}, { "X-Gateway-Key": apiKey });
      const response = await fetch(url, Object.assign({}, options, { headers }));
      return parseResponse(response);
    }

    function providerType(provider) {
      return provider === "ollama" ? "локальная" : "внешняя";
    }

    function modelCard(item) {
      const node = document.createElement("section");
      node.className = "card";
      node.innerHTML = `
        <div class="model-title">${item.display_name}</div>
        <div class="chip">Тип: ${providerType(item.provider)}</div>
        <button data-model="${item.model_id}" type="button">Открыть страницу модели</button>
      `;
      node.querySelector("button").onclick = () => {
        window.location.href = `/gateway/model/${encodeURIComponent(item.model_id)}`;
      };
      return node;
    }

    async function loadModels() {
      const wrap = document.getElementById("modelsWrap");
      wrap.innerHTML = "";
      try {
        const data = await apiFetch("/gateway/models");
        data.models.forEach((item) => wrap.appendChild(modelCard(item)));
      } catch (error) {
        const box = document.createElement("section");
        box.className = "card";
        box.textContent = String(error);
        wrap.appendChild(box);
      }
    }

    function logout() {
      localStorage.removeItem(API_KEY_STORAGE);
      localStorage.removeItem(USER_ROLE_STORAGE);
      window.location.href = "/gateway/login";
    }

    document.getElementById("reloadBtn").addEventListener("click", loadModels);
    document.getElementById("logoutBtn").addEventListener("click", logout);

    if (!getApiKey()) {
      window.location.href = "/gateway/login";
    } else {
      updateNav();
      loadModels();
    }
  </script>
</body>
</html>
